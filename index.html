<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Continue</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      overflow: hidden;
    }

    .container {
      width: calc(100% - 40px);
      max-width: 390px;
      padding: 34px 26px 36px;
      text-align: center;
      border-radius: 22px;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.35s ease forwards 0.08s;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 31px;
      line-height: 1.12;
      font-weight: 600;
      letter-spacing: -0.8px;
      color: #000;
      margin-bottom: 18px;
    }

    h1 span {
      color: #000;
    }

    .arrow {
      width: 0;
      height: 0;
      margin: 0 auto 22px;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 26px solid #000;
      animation: bounce 1.15s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(7px);
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 62px;
      border-radius: 16px;
      border: none;
      text-decoration: none;
      cursor: pointer;
      background: #000;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .btn:active {
      transform: scale(0.97);
      filter: brightness(1.08);
    }

    @media (max-width: 390px) {
      .container {
        width: calc(100% - 34px);
        padding: 30px 22px 32px;
      }

      h1 {
        font-size: 28px;
      }

      .btn {
        min-height: 58px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>
      Click here to Get<br />
      <span>Started</span>
    </h1>

    <div class="arrow"></div>

    <a class="btn" id="cta" href="#">CONTINUE</a>
  </div>

  <script>
  const params = new URLSearchParams(window.location.search);
  const ad = params.get("ad");
  const LANDER_BASE = "https://www.perkc.com/";
  const LANDER_URL = ad
    ? `${LANDER_BASE}?ad=${encodeURIComponent(ad)}`
    : LANDER_BASE;

  const cta = document.getElementById("cta");

  cta.addEventListener("click", function(e) {
    e.preventDefault();
    const ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/i.test(ua)) {
      window.location.href = LANDER_URL.replace("https://", "x-safari-https://");
    } else if (/Android/i.test(ua)) {
      window.location.href = LANDER_URL.replace("https://", "googlechrome://");
    } else {
      window.open(LANDER_URL, "_blank");
    }
  });
</script>
</body>
</html>
