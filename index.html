<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Continue</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 35%, rgba(164, 69, 255, 0.22), transparent 34%),
        radial-gradient(circle at 50% 70%, rgba(149, 60, 255, 0.14), transparent 30%),
        linear-gradient(180deg, #0b0612 0%, #05050a 100%);
      overflow: hidden;
    }

    .container {
      width: calc(100% - 40px);
      max-width: 390px;
      padding: 34px 26px 36px;
      text-align: center;
      border-radius: 22px;
      background: rgba(12, 10, 20, 0.72);
      border: 1px solid rgba(180, 81, 255, 0.18);
      box-shadow:
        0 0 28px rgba(149, 60, 255, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.35s ease forwards 0.08s;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 31px;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: -0.8px;
      color: #ffffff;
      margin-bottom: 18px;
    }

    h1 span {
      background: linear-gradient(90deg, #a735f0 0%, #c9709a 50%, #ffd21f 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .arrow {
      width: 0;
      height: 0;
      margin: 0 auto 22px;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 26px solid #b451ff;
      filter:
        drop-shadow(0 0 10px rgba(180, 81, 255, 0.8))
        drop-shadow(0 0 24px rgba(149, 60, 255, 0.55));
      animation: bounce 1.15s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(7px);
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 62px;
      border-radius: 16px;
      border: none;
      text-decoration: none;
      cursor: pointer;
      background: linear-gradient(90deg, #953cff 0%, #b451ff 100%);
      color: #ffffff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      box-shadow:
        0 0 0 2px rgba(95, 42, 155, 0.45),
        0 12px 28px rgba(149, 60, 255, 0.38),
        0 0 36px rgba(180, 81, 255, 0.42);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .btn:active {
      transform: scale(0.97);
      filter: brightness(1.08);
    }

    .glow-dot {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #b451ff;
      box-shadow: 0 0 14px rgba(180, 81, 255, 0.9);
      opacity: 0.8;
    }

    .dot-1 {
      top: 24%;
      left: 18%;
    }

    .dot-2 {
      bottom: 25%;
      right: 17%;
    }

    @media (max-width: 390px) {
      .container {
        width: calc(100% - 34px);
        padding: 30px 22px 32px;
      }

      h1 {
        font-size: 28px;
      }

      .btn {
        min-height: 58px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="glow-dot dot-1"></div>
  <div class="glow-dot dot-2"></div>

  <div class="container">
    <h1>
      Click here to Get<br />
      <span>Started</span>
    </h1>

    <div class="arrow"></div>

    <a class="btn" id="cta" href="#">CONTINUE</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ad = params.get("ad");

    const LANDER_BASE = "https://perkc.lovable.app/";
    const LANDER_URL = ad
      ? `${LANDER_BASE}?ad=${encodeURIComponent(ad)}`
      : LANDER_BASE;

    const cta = document.getElementById("cta");
    cta.href = LANDER_URL;

    cta.addEventListener("click", function (e) {
      e.preventDefault();
      window.location.href = LANDER_URL;
    });

    // Optional auto-redirect attempt after page loads
    setTimeout(() => {
      window.location.href = LANDER_URL;
    }, 900);
  </script>
</body>
</html>
